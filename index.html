<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caisse - Le Vesuvio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-midi">
    <div class="app-container">
        <div class="service-picker">
            <button id="btn-midi" onclick="app.setService('Midi')">☀️ MIDI (Rapide)</button>
            <button id="btn-soir" onclick="app.setService('Soir')">🏁 CLÔTURE (Complet)</button>
        </div>

        <section id="view-midi-fast" class="view">
            <h1>Saisie Logiciel (Midi)</h1>
            <div class="card-section">
                <div class="input-group-list"><label>CB Classique (€)</label><input type="number" id="midi-cb" inputmode="decimal"></div>
                <div class="input-group-list"><label>CB Ticket Resto (€)</label><input type="number" id="midi-tr" inputmode="decimal"></div>
                <div class="input-group-list"><label>MyPos (€)</label><input type="number" id="midi-mypos" inputmode="decimal"></div>
                <div class="input-group-list"><label>Espèces Adipos (€)</label><input type="number" id="midi-cash" inputmode="decimal"></div>
                <div class="input-group-list"><label>ANCV Papier (€)</label><input type="number" id="midi-ancv-p" inputmode="decimal"></div>
                <div class="input-group-list"><label>ANCV Connect (€)</label><input type="number" id="midi-ancv-c" inputmode="decimal"></div>
                <div class="input-group-list"><label>Chèques (€)</label><input type="number" id="midi-checks" inputmode="decimal"></div>
                <hr>
                <div class="input-group-list"><label>Pizzas Emportées</label><input type="number" id="midi-piz-e" inputmode="numeric"></div>
                <div class="input-group-list"><label>Pizzas Sur Place</label><input type="number" id="midi-piz-p" inputmode="numeric"></div>
                <hr>
                <div class="input-group-list"><label>TTC 5.5%</label><input type="number" id="midi-tva5" inputmode="decimal"></div>
                <div class="input-group-list"><label>TTC 10%</label><input type="number" id="midi-tva10" inputmode="decimal"></div>
                <div class="input-group-list"><label>TTC 20%</label><input type="number" id="midi-tva20" inputmode="decimal"></div>
            </div>
        </section>

        <div id="views-soir-container" class="hidden">
            <section id="view-cards-soir" class="view">
                <h1>💳 Cartes Bancaires</h1>
                <div class="card-section">
                    <h3 style="margin-bottom:10px; color:#1e293b; border-bottom:1px solid #ddd;">CB CLASSIQUE</h3>
                    <div class="input-group"><label>Contact</label><input type="number" id="cb-contact-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>Sans Contact</label><input type="number" id="cb-sans-contact-soir" inputmode="decimal"></div>
                    
                    <h3 style="margin:15px 0 10px 0; color:#1e293b; border-bottom:1px solid #ddd;">CB TICKET RESTO</h3>
                    <div class="input-group"><label>TR Contact</label><input type="number" id="tr-contact-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>TR Sans Contact</label><input type="number" id="tr-sans-contact-soir" inputmode="decimal"></div>
                </div>
                <div class="card-section">
                    <h2>MyPos (Hors Z)</h2>
                    <input type="number" id="mypos-amt-soir" inputmode="decimal" placeholder="Montant MyPos">
                    <button class="btn-primary" onclick="app.addItem('mypos')">Ajouter</button>
                    <div id="mypos-recap-soir" class="recap-mini"></div>
                </div>
            </section>

            <section id="view-cash-soir" class="view hidden">
                <h1>💰 Espèces</h1>
                <div class="card-section">
                    <div class="input-group" style="background:#f1f5f9; padding:10px; border-radius:8px;">
                        <label>Fond de Caisse (€)</label>
                        <input type="number" id="fond-caisse-input" oninput="app.refreshUI()">
                    </div>
                    <div class="total-display highlight">Net : <span id="cash-net-display">0.00</span> €</div>
                    <div class="cash-grid" id="cash-container"></div>
                </div>
            </section>

            <section id="view-checks-soir" class="view hidden">
                <h1>✍️ Chèques</h1>
                <div class="card-section">
                    <input type="number" id="check-amt-soir" inputmode="decimal" placeholder="Montant chèque">
                    <button class="btn-primary" onclick="app.addItem('checks')">Ajouter</button>
                    <div id="checks-recap-soir" class="recap-mini"></div>
                </div>
            </section>

            <section id="view-ancv-soir" class="view hidden">
                <h1>🏖️ ANCV</h1>
                <div class="card-section">
                    <div class="type-selector">
                        <input type="radio" id="type-p" name="ancv-t" value="Papier" checked onclick="app.toggleAncvInput()"><label for="type-p">Papier</label>
                        <input type="radio" id="type-c" name="ancv-t" value="Connect" onclick="app.toggleAncvInput()"><label for="type-c">Connect</label>
                    </div>
                    
                    <div class="input-group-list">
                        <label>Nombre de chèques</label>
                        <input type="number" id="ancv-qty-soir" placeholder="Qté" inputmode="numeric">
                    </div>
            
                    <div id="ancv-values-papier" style="margin-top:15px;">
                        <div class="type-selector">
                            <input type="radio" id="val-10" name="ancv-v-fixe" value="10" checked><label for="val-10">10€</label>
                            <input type="radio" id="val-25" name="ancv-v-fixe" value="25"><label for="val-25">25€</label>
                            <input type="radio" id="val-50" name="ancv-v-fixe" value="50"><label for="val-50">50€</label>
                        </div>
                    </div>
            
                    <div id="ancv-values-connect" class="hidden" style="margin-top:15px;">
                        <input type="number" id="ancv-val-soir" placeholder="Montant libre €" inputmode="decimal" style="width: 100%;">
                    </div>
            
                    <button class="btn-primary" style="margin-top:15px;" onclick="app.addItem('ancv')">Ajouter</button>
                </div>
                <div id="ancv-recap-soir" class="recap-mini"></div>
            </section>

            <section id="view-pos-soir" class="view hidden">
                <h1>🖥️ Logiciel Adipos</h1>
                <div class="card-section">
                    <div class="input-group"><label>Espèces Logiciel (Z)</label><input type="number" id="pos-cash-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>Pizzas Emportées</label><input type="number" id="pos-piz-e-soir" inputmode="numeric"></div>
                    <div class="input-group"><label>Couverts (Place)</label><input type="number" id="pos-piz-p-soir" inputmode="numeric"></div>
                    <hr>
                    <div class="input-group"><label>TTC 5.5%</label><input type="number" id="tva5-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>TTC 10%</label><input type="number" id="tva10-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>TTC 20%</label><input type="number" id="tva20-soir" inputmode="decimal"></div>
                </div>
            </section>
        </div>

        <div id="modal-recap" class="modal hidden">
            <div class="modal-content">
                <div id="recap-body"></div>
                <button class="btn-primary" style="background:#64748b; margin-top:10px;" onclick="app.closeRecap()">MODIFIER</button>
            </div>
        </div>

        <nav class="nav-bar">
            <button id="nav-midi-btn" onclick="app.setService('Midi')">☀️ Saisie</button>
            <button id="nav-cb-btn" onclick="app.showView('view-cards-soir')" class="soir-only hidden">💳 CB</button>
            <button id="nav-cash-btn" onclick="app.showView('view-cash-soir')" class="soir-only hidden">💰 Esp.</button>
            <button id="nav-checks-btn" onclick="app.showView('view-checks-soir')" class="soir-only hidden">✍️ Chq</button>
            <button id="nav-ancv-btn" onclick="app.showView('view-ancv-soir')" class="soir-only hidden">🏖️ ANCV</button>
            <button id="nav-pos-btn" onclick="app.showView('view-pos-soir')" class="soir-only hidden">🖥️ Z</button>
            <button class="btn-recap-nav" onclick="app.openRecap()">📋 RÉCAP</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
