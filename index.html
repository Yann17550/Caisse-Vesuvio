<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caisse - Le Vesuvio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-midi">
    <div class="app-container">
        <div class="service-picker">
            <button id="btn-midi" onclick="app.setService('Midi')">☀️ MIDI (Rapide)</button>
            <button id="btn-soir" onclick="app.setService('Soir')">🏁 CLÔTURE (Complet)</button>
        </div>

        <section id="view-midi-fast" class="view">
            <h1>Saisie Logiciel (Midi)</h1>
            <div class="card-section">
                <h2>Chiffres Adipos</h2>
                <div class="input-group-list"><label>CB Classique (€)</label><input type="number" id="midi-cb" inputmode="decimal"></div>
                <div class="input-group-list"><label>CB Ticket Resto (€)</label><input type="number" id="midi-tr" inputmode="decimal"></div>
                <div class="input-group-list"><label>MyPos (€)</label><input type="number" id="midi-mypos" inputmode="decimal"></div>
                <div class="input-group-list"><label>Espèces Adipos (€)</label><input type="number" id="midi-cash" inputmode="decimal"></div>
                <div class="input-group-list"><label>ANCV (€)</label><input type="number" id="midi-ancv" inputmode="decimal"></div>
                <div class="input-group-list"><label>Chèques (€)</label><input type="number" id="midi-checks" inputmode="decimal"></div>
            </div>
            <div class="card-section">
                <h2>Ventes & TVA</h2>
                <div class="input-group-list"><label>Pizzas Emportées</label><input type="number" id="midi-piz-e" inputmode="numeric"></div>
                <div class="input-group-list"><label>Pizzas Sur Place</label><input type="number" id="midi-piz-p" inputmode="numeric"></div>
                <hr>
                <div class="input-group-list"><label>TTC 5.5%</label><input type="number" id="midi-tva5" inputmode="decimal"></div>
                <div class="input-group-list"><label>TTC 10%</label><input type="number" id="midi-tva10" inputmode="decimal"></div>
                <div class="input-group-list"><label>TTC 20%</label><input type="number" id="midi-tva20" inputmode="decimal"></div>
            </div>
        </section>

        <div id="views-soir-container" class="hidden">
            <section id="view-cards-soir" class="view">
                <h1>💳 Cartes Bancaires</h1>
                <div class="card-section">
                    <h2>CB Classique</h2>
                    <div class="input-group"><label>Contact</label><input type="number" id="cb-c-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>Sans Contact</label><input type="number" id="cb-sc-soir" inputmode="decimal"></div>
                </div>
                <div class="card-section">
                    <h2>Ticket Restaurant</h2>
                    <div class="input-group"><label>Contact</label><input type="number" id="tr-c-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>Sans Contact</label><input type="number" id="tr-sc-soir" inputmode="decimal"></div>
                </div>
                <div class="card-section">
                    <h2>MyPos</h2>
                    <input type="number" id="mypos-amt-soir" inputmode="decimal" placeholder="Montant">
                    <button class="btn-primary" onclick="app.addItem('mypos')">Ajouter</button>
                    <div id="mypos-recap-soir" class="recap-mini"></div>
                </div>
            </section>

            <section id="view-cash-soir" class="view hidden">
                <h1>💰 Espèces</h1>
                <div class="card-section">
                    <div class="total-display highlight">Total : <span id="cash-brut-soir">0.00</span> €</div>
                    <div class="cash-grid" id="cash-container"></div>
                </div>
            </section>

            <section id="view-ancv-soir" class="view hidden">
                <h1>🏖️ ANCV</h1>
                <div class="card-section">
                    <div class="type-selector">
                        <input type="radio" id="type-p" name="ancv-t" value="Papier" checked>
                        <label for="type-p">📄 Papier</label>
                        <input type="radio" id="type-c" name="ancv-t" value="Connect">
                        <label for="type-c">📱 Connect</label>
                    </div>
                    <select id="ancv-val-soir">
                        <option value="10">10 €</option><option value="20">20 €</option><option value="25">25 €</option><option value="50">50 €</option>
                    </select>
                    <input type="number" id="ancv-qty-soir" placeholder="Nombre" inputmode="numeric">
                    <button class="btn-primary" onclick="app.addItem('ancv')">Ajouter ANCV</button>
                </div>
                <div id="ancv-recap-soir" class="recap-mini"></div>
            </section>

            <section id="view-pos-soir" class="view hidden">
                <h1>🖥️ Logiciel & Chèques</h1>
                <div class="card-section">
                    <h2>Chèques Papier</h2>
                    <input type="number" id="check-amt-soir" inputmode="decimal" placeholder="Montant">
                    <button class="btn-primary" onclick="app.addItem('checks')">Ajouter Chèque</button>
                    <div id="checks-recap-soir" class="recap-mini"></div>
                </div>
                <div class="card-section">
                    <h2>Données Adipos</h2>
                    <div class="input-group"><label>Espèces Logiciel</label><input type="number" id="pos-cash-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>Pizzas E</label><input type="number" id="pos-piz-e-soir" inputmode="numeric"></div>
                    <div class="input-group"><label>Pizzas P</label><input type="number" id="pos-piz-p-soir" inputmode="numeric"></div>
                </div>
                <div class="card-section">
                    <h2>TVA TTC</h2>
                    <div class="input-group"><label>TTC 5.5%</label><input type="number" id="tva5-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>TTC 10%</label><input type="number" id="tva10-soir" inputmode="decimal"></div>
                    <div class="input-group"><label>TTC 20%</label><input type="number" id="tva20-soir" inputmode="decimal"></div>
                </div>
            </section>
        </div>

        <div id="modal-recap" class="modal hidden">
            <div class="modal-content">
                <h2>📊 RÉCAPITULATIF</h2>
                <div id="recap-body"></div>
                <button class="btn-primary" style="background:#64748b; margin-top:10px;" onclick="app.closeRecap()">MODIFIER</button>
            </div>
        </div>

        <nav class="nav-bar">
            <button id="nav-midi-btn" onclick="app.setService('Midi')">☀️ Saisie</button>
            <button id="nav-cb-btn" onclick="app.showView('view-cards-soir')" class="soir-only hidden">💳 CB</button>
            <button id="nav-cash-btn" onclick="app.showView('view-cash-soir')" class="soir-only hidden">💰 Esp.</button>
            <button id="nav-ancv-btn" onclick="app.showView('view-ancv-soir')" class="soir-only hidden">🏖️ ANCV</button>
            <button id="nav-pos-btn" onclick="app.showView('view-pos-soir')" class="soir-only hidden">🖥️ Logiciel</button>
            <button class="btn-recap-nav" onclick="app.openRecap()">📋 RÉCAP</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
