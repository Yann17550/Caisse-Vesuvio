<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caisse - Le Vesuvio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-midi">
    <div class="app-container">
        <div class="service-picker">
            <button id="btn-midi" onclick="app.setService('Midi')">☀️ MIDI (Rapide)</button>
            <button id="btn-soir" onclick="app.setService('Soir')">🌙 SOIR (Complet)</button>
        </div>

        <section id="view-midi-fast" class="view">
            <h1>Saisie Logiciel (Midi)</h1>
            <div class="card-section">
                <div class="input-group-list">
                    <label>CB Classique (€)</label>
                    <input type="number" id="midi-cb" inputmode="decimal">
                </div>
                <div class="input-group-list">
                    <label>CB Ticket Resto (€)</label>
                    <input type="number" id="midi-tr" inputmode="decimal">
                </div>
                <div class="input-group-list">
                    <label>MyPos (€)</label>
                    <input type="number" id="midi-mypos" inputmode="decimal">
                </div>
                <div class="input-group-list">
                    <label>Espèces Adipos (€)</label>
                    <input type="number" id="midi-cash" inputmode="decimal">
                </div>
                <div class="input-group-list">
                    <label>ANCV (€)</label>
                    <input type="number" id="midi-ancv" inputmode="decimal">
                </div>
                <div class="input-group-list">
                    <label>Chèques (€)</label>
                    <input type="number" id="midi-checks" inputmode="decimal">
                </div>
            </div>
            <div class="card-section">
                <h2>Pizzas & TVA</h2>
                <div class="input-group-list"><label>Emportées</label><input type="number" id="pos-pizzas-e-midi" inputmode="numeric"></div>
                <div class="input-group-list"><label>Sur Place</label><input type="number" id="pos-pizzas-p-midi" inputmode="numeric"></div>
                <hr>
                <div class="input-group-list"><label>TTC 5.5%</label><input type="number" id="tva-5-midi" inputmode="decimal"></div>
                <div class="input-group-list"><label>TTC 10%</label><input type="number" id="tva-10-midi" inputmode="decimal"></div>
                <div class="input-group-list"><label>TTC 20%</label><input type="number" id="tva-20-midi" inputmode="decimal"></div>
            </div>
        </section>

        <div id="views-soir-container" class="hidden">
            <section id="view-cards" class="view">
                <h1>💳 Cartes Bancaires</h1>
                <div class="card-section">
                    <div class="input-group"><label>CB Contact</label><input type="number" id="cb-contact" inputmode="decimal"></div>
                    <div class="input-group"><label>CB Sans Contact</label><input type="number" id="cb-sans-contact" inputmode="decimal"></div>
                    <hr>
                    <div class="input-group"><label>TR Contact</label><input type="number" id="tr-contact" inputmode="decimal"></div>
                    <div class="input-group"><label>TR Sans Contact</label><input type="number" id="tr-sans-contact" inputmode="decimal"></div>
                </div>
                <div class="card-section">
                    <h2>MyPos</h2>
                    <input type="number" id="mypos-amount" inputmode="decimal" placeholder="Montant (€)">
                    <button class="btn-primary" onclick="app.addMyPos()">Ajouter MyPos</button>
                    <div id="mypos-recap"></div>
                </div>
            </section>

            <section id="view-cash" class="view hidden">
                <h1>💰 Espèces</h1>
                <div class="card-section">
                    <div class="total-display highlight">Total Compté : <span id="total-cash-brut">0.00</span> €</div>
                    <div class="cash-grid" id="cash-container"></div>
                </div>
            </section>

            </div>

        <div id="modal-recap" class="modal hidden">
            <div class="modal-content">
                <h2 id="recap-title">📊 RÉCAPITULATIF</h2>
                <div id="recap-body"></div>
                <button class="btn-primary" style="background:#64748b; margin-top:10px;" onclick="app.closeRecap()">MODIFIER</button>
            </div>
        </div>

        <nav class="nav-bar">
            <button onclick="app.showMidiOrView('view-cards')">💳 CB / Midi</button>
            <button id="nav-cash" onclick="app.showView('view-cash')">💰 Espèces</button>
            <button id="nav-ancv" onclick="app.showView('view-ancv')">🏖️ ANCV</button>
            <button id="nav-pos" onclick="app.showView('view-pos')">🖥️ POS</button>
            <button class="btn-recap-nav" onclick="app.openRecap()">📋 RÉCAP</button>
        </nav>
    </div>
    <script src="app.js"></script>
</body>
</html>
